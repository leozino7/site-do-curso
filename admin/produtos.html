<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Admin - Produtos</title>
<link rel="stylesheet" href="../css/style.css">
</head>

<body class="admin-body">

<div class="admin-container">

<div class="sidebar">
    <h2>Altus Tech</h2>
    <a href="dashboard.html">Dashboard</a>
    <a href="produtos.html">Produtos</a>
    <a href="clientes.html">Clientes</a>
    <a href="financeiro.html">Financeiro</a>
    <a href="../index.html">Voltar ao Site</a>
</div>

<div class="dashboard">
<h1>Gerenciar Produtos</h1>

<div class="admin-card">
<h3>Drone de Entrega</h3>
<p>Status: Ativo</p>
<button>Editar</button>
<button>Remover</button>
</div>

<div class="admin-card">
<h3>BioLoop Drones</h3>
<p>Status: Ativo</p>
<button>Editar</button>
<button>Remover</button>
</div>

</div>

</div>
<div class="admin-card" id="produto1">
    <h3 contenteditable="false">Drone de Entrega</h3>
    <p>Status: Ativo</p>
    <button onclick="editarProduto(this)">Editar</button>
    <button onclick="removerProduto(this)">Remover</button>
</div>

<div class="admin-card" id="produto2">
    <h3 contenteditable="false">BioLoop Drones</h3>
    <p>Status: Ativo</p>
    <button onclick="editarProduto(this)">Editar</button>
    <button onclick="removerProduto(this)">Remover</button>
</div>

<div class="admin-card" id="produto1">
    <h3 contenteditable="false">Drone de Entrega</h3>
    <p class="status">Status: Ativo</p>

    <button onclick="editarProduto(this)">Editar</button>
    <button onclick="removerProduto(this)">Remover</button>
    <button onclick="toggleStatus(this)">Desativar</button>
</div>


<script>
function removerProduto(botao) {
    const card = botao.parentElement;
    card.remove();
}

function editarProduto(botao) {
    const card = botao.parentElement;
    const titulo = card.querySelector("h3");

    if (titulo.isContentEditable) {
        titulo.contentEditable = "false";
        botao.innerText = "Editar";
    } else {
        titulo.contentEditable = "true";
        titulo.focus();
        botao.innerText = "Salvar";
    }
}

function toggleStatus(botao) {
    const card = botao.parentElement;
    const status = card.querySelector(".status");

    if (status.innerText.includes("Ativo")) {
        status.innerText = "Status: Inativo";
        botao.innerText = "Reativar";

        // efeito visual
        card.style.opacity = "0.5";
    } else {
        status.innerText = "Status: Ativo";
        botao.innerText = "Desativar";

        card.style.opacity = "1";
    }
}
</script>

</body>
</html>
